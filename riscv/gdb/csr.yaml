mstatus:
  desc: machine status
  fields:
    - { name: MIE,   bits: "3",      desc: global irq enable }
    - { name: MPIE,  bits: "7",      desc: prev irq enable }
    - { name: MPP,   bits: "12:11",  desc: prev privilege }
    - { name: FS,    bits: "14:13",  desc: fp status }
    - { name: XS,    bits: "16:15",  desc: ext status }

misa:
  desc: machine isa
  fields:
    - { name: MXL, bits: "31:30", desc: xlen (1=32;2=64;3=128) }
    - { name: A, bits: "0",  desc: atomic }
    - { name: S, bits: "18", desc: supervisor }
    - { name: U, bits: "20", desc: user mode }

mcause:
  desc: machine cause
  fields:
    - { name: IRQ,   bits: "31",     desc: interrupt flag }
    - { name: CODE,  bits: "7:0",    desc: cause code }


mtvec:
  desc: trap vector base
  fields:
    - { name: MODE,  bits: "1:0",    desc: vector mode }


mie:
  desc: interrupt enable
  fields:
    - { name: MSIE,  bits: "3",      desc: software irq enable }
    - { name: MTIE,  bits: "7",      desc: timer irq enable }
    - { name: MEIE,  bits: "11",     desc: external irq enable }


mip:
  desc: interrupt pending
  fields:
    - { name: MSIP,  bits: "3",      desc: software pending }
    - { name: MTIP,  bits: "7",      desc: timer pending }
    - { name: MEIP,  bits: "11",     desc: external pending }


# ---- supervisor (optional but useful) ----

sstatus:
  desc: supervisor status
  fields:
    - { name: SIE,   bits: "1",      desc: global irq enable }
    - { name: SPIE,  bits: "5",      desc: prev irq enable }
    - { name: SPP,   bits: "8",      desc: prev privilege }


scause:
  desc: supervisor cause
  fields:
    - { name: IRQ,   bits: "31",     desc: interrupt flag }
    - { name: CODE,  bits: "7:0",    desc: cause code }


stval:
  desc: trap value
  fields: []


stvec:
  desc: trap vector
  fields:
    - { name: BASE,  bits: "31:2",   desc: base address }
    - { name: MODE,  bits: "1:0",    desc: vector mode }


sie:
  desc: supervisor interrupt enable
  fields:
    - { name: SSIE,  bits: "1",      desc: software irq enable }
    - { name: STIE,  bits: "5",      desc: timer irq enable }
    - { name: SEIE,  bits: "9",      desc: external irq enable }


sip:
  desc: supervisor interrupt pending
  fields:
    - { name: SSIP,  bits: "1",      desc: software pending }
    - { name: STIP,  bits: "5",      desc: timer pending }
    - { name: SEIP,  bits: "9",      desc: external pending }
